name: Build example installers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  build-windows-installers:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Build all examples
        run: |
          cd examples
          bash build.sh

      - name: Install Inno Setup
        run: |
          choco install innosetup -y

      - name: Build Windows installer (Inno Setup)
        run: |
          cd examples/installers
          ISCC windows-goxpyriment-examples.iss

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: examples/installers/goxpyriment-examples-setup.exe

  build-macos-dmg:
    runs-on: macos-latest
    env:
      CGO_ENABLED: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Build macOS DMG (non-video examples)
        run: |
          cd examples/installers
          bash build-macos-dmg.sh

      - name: Upload macOS DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: examples/installers/goxpyriment-examples.dmg

  build-linux-appimages:
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Download appimagetool
        run: |
          cd examples
          mkdir -p installers/AppImages
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O installers/appimagetool
          chmod +x installers/appimagetool

      - name: Build AppImages for each example
        run: |
          cd examples
          APPDIR_ROOT="installers/AppImages"
          TOOL="./installers/appimagetool"
          mkdir -p "${APPDIR_ROOT}"
          for dir in */; do
            name="${dir%/}"
            if [[ "${name}" == "assets" || "${name}" == "installers" || "${name}" == "xpd_results" ]]; then
              continue
            fi
            # Skip video/FFmpeg-dependent examples for now (go-astiav / cgo disabled)
            if [[ "${name}" == "play_two_videos" || "${name}" == "play_videos" ]]; then
              continue
            fi
            if [[ ! -f "${dir}/main.go" ]]; then
              continue
            fi
            echo "Packaging ${name} as AppImage..."
            appdir="${APPDIR_ROOT}/${name}.AppDir"
            mkdir -p "${appdir}/usr/bin" "${appdir}/usr/share/applications"
            # Binary: go build already produced it as the folder name
            if [[ -f "${dir%/}/${name}" ]]; then
              cp "${dir%/}/${name}" "${appdir}/usr/bin/${name}"
            else
              # Fallback: build just this example
              (cd "${dir}" && go build -o "../${appdir}/usr/bin/${name}" .)
            fi
            # AppRun
            echo '#!/bin/sh' > "${appdir}/AppRun"
            echo "exec ./usr/bin/${name} \"\$@\"" >> "${appdir}/AppRun"
            chmod +x "${appdir}/AppRun"
            # .desktop
            desktop_dir="${appdir}/usr/share/applications"
            desktop="${desktop_dir}/${name}.desktop"
            mkdir -p "${desktop_dir}"
            {
              echo "[Desktop Entry]"
              echo "Type=Application"
              echo "Name=${name}"
              echo "Exec=${name}"
              echo "Icon=application-default-icon"
              echo "Categories=Education;"
            } > "${desktop}"
            # AppImageKit expects a .desktop file at the root of the AppDir as well.
            cp "${desktop}" "${appdir}/${name}.desktop"
            # Provide a dummy icon so appimagetool is satisfied.
            touch "${appdir}/application-default-icon.png"
            APPIMAGE_EXTRACT_AND_RUN=1 "${TOOL}" "${appdir}" "${APPDIR_ROOT}/${name}.AppImage"
          done

      - name: Archive AppImages
        run: |
          cd examples/installers
          tar czf goxpyriment-examples-appimages.tar.gz -C AppImages .

      - name: Upload Linux AppImages artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimages
          path: examples/installers/goxpyriment-examples-appimages.tar.gz

  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs:
      - build-windows-installers
      - build-macos-dmg
      - build-linux-appimages
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          path: installers

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: "Goxpyriment examples ${github.ref_name}"
          draft: false
          prerelease: false

      - name: Upload Windows installer to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: installers/windows-installer/goxpyriment-examples-setup.exe
          asset_name: goxpyriment-examples-setup-${{ github.ref_name }}.exe
          asset_content_type: application/vnd.microsoft.portable-executable

      - name: Upload macOS DMG to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: installers/macos-dmg/goxpyriment-examples.dmg
          asset_name: goxpyriment-examples-${{ github.ref_name }}.dmg
          asset_content_type: application/x-apple-diskimage

      - name: Upload Linux AppImages archive to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: installers/linux-appimages/goxpyriment-examples-appimages.tar.gz
          asset_name: goxpyriment-examples-appimages-${{ github.ref_name }}.tar.gz
          asset_content_type: application/gzip

