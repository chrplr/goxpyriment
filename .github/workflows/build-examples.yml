name: Build example installers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  build-windows-installers:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Build all examples
        run: |
          cd examples
          bash build.sh

      - name: Install Inno Setup
        run: |
          choco install innosetup -y

      - name: Build Windows installer (Inno Setup)
        run: |
          cd examples/installers
          ISCC windows-goxpyriment-examples.iss

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: examples/installers/goxpyriment-examples-setup.exe

  build-macos-dmg:
    runs-on: macos-latest
    env:
      CGO_ENABLED: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Build macOS DMG (non-video examples)
        run: |
          cd examples/installers
          bash build-macos-dmg.sh

      - name: Upload macOS DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: examples/installers/goxpyriment-examples.dmg

  build-linux-appimages:
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Download appimagetool
        run: |
          cd examples
          mkdir -p installers/AppImages
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O installers/appimagetool
          chmod +x installers/appimagetool

      - name: Build AppImages for each example
        run: |
          cd examples
          APPDIR_ROOT="installers/AppImages"
          TOOL="./installers/appimagetool"
          mkdir -p "${APPDIR_ROOT}"
          for dir in */; do
            name="${dir%/}"
            if [[ "${name}" == "assets" || "${name}" == "installers" || "${name}" == "xpd_results" ]]; then
              continue
            fi
            if [[ "${name}" == "play_two_videos" || "${name}" == "play_videos" ]]; then
              continue
            fi
            if [[ ! -f "${dir}/main.go" ]]; then
              continue
            fi
            echo "Packaging ${name} as AppImage..."
            appdir="${APPDIR_ROOT}/${name}.AppDir"
            mkdir -p "${appdir}/usr/bin" "${appdir}/usr/share/applications"
            if [[ -f "${dir%/}/${name}" ]]; then
              cp "${dir%/}/${name}" "${appdir}/usr/bin/${name}"
            else
              (cd "${dir}" && go build -o "../${appdir}/usr/bin/${name}" .)
            fi
            echo '#!/bin/sh' > "${appdir}/AppRun"
            echo "exec ./usr/bin/${name} \"\$@\"" >> "${appdir}/AppRun"
            chmod +x "${appdir}/AppRun"
            desktop_dir="${appdir}/usr/share/applications"
            desktop="${desktop_dir}/${name}.desktop"
            mkdir -p "${desktop_dir}"
            {
              echo "[Desktop Entry]"
              echo "Type=Application"
              echo "Name=${name}"
              echo "Exec=${name}"
              echo "Icon=application-default-icon"
              echo "Categories=Education;"
            } > "${desktop}"
            cp "${desktop}" "${appdir}/${name}.desktop"
            touch "${appdir}/application-default-icon.png"
            APPIMAGE_EXTRACT_AND_RUN=1 "${TOOL}" "${appdir}" "${APPDIR_ROOT}/${name}.AppImage"
          done

      - name: Archive AppImages
        run: |
          cd examples/installers
          tar czf goxpyriment-examples-appimages.tar.gz -C AppImages .

      - name: Upload Linux AppImages artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimages
          path: examples/installers/goxpyriment-examples-appimages.tar.gz

  create-release:
    runs-on: ubuntu-latest
    needs:
      - build-windows-installers
      - build-macos-dmg
      - build-linux-appimages
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write # Crucial for creating releases
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          name: Goxpyriment examples ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            artifacts/windows-installer/goxpyriment-examples-setup.exe
            artifacts/macos-dmg/goxpyriment-examples.dmg
            artifacts/linux-appimages/goxpyriment-examples-appimages.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
